<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 热血打卡 · 闯关待办</title>
  <style>
    /* ============================================================
       CSS 变量 —— 一键换肤修改此处即可
       ============================================================ */
    :root {
      --primary-start: #6c5ce7;
      --primary-end: #4834d4;
      --primary-light: #a29bfe;
      --primary-dark: #2d1b69;
      --accent: #ff6b35;
      --accent-hover: #ff8c5a;
      --accent-glow: rgba(255, 107, 53, 0.45);
      --success: #00d2a0;
      --danger: #ff5e5e;
      --text-primary: #1a1a2e;
      --text-secondary: #555;
      --text-muted: #aaa;
      --text-light: #fff;
      --card-bg: rgba(255, 255, 255, 0.68);
      --card-border: rgba(255, 255, 255, 0.55);
      --card-shadow: 0 8px 48px rgba(108, 92, 231, 0.14), 0 2px 10px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.6);
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 26px;
      --radius-xl: 32px;
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-fast: 0.2s;
      --dur-normal: 0.35s;
      --dur-slow: 0.6s;
      --font-main: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ============================================================
       背景层：蓝紫渐变 + Canvas 粒子 + 流动光斑
       ============================================================ */
    body {
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 36px 16px 70px;
      background: linear-gradient(160deg, #f0edff 0%, #dfd6fb 20%, #cfd9ff 45%, #ebd4fc 70%, #e2deff 100%);
      background-attachment: fixed;
      position: relative;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      color: var(--text-primary);
    }

    /* 流动光斑 */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 600px 500px at 15% 20%, rgba(108,92,231,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 500px 400px at 82% 65%, rgba(255,107,53,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 450px 450px at 50% 40%, rgba(130,200,255,0.06) 0%, transparent 58%);
      animation: floatOrbs 10s ease-in-out infinite alternate;
    }

    @keyframes floatOrbs {
      0%   { opacity:0.6; transform:scale(1) translate(0,0); }
      33%  { opacity:1; transform:scale(1.06) translate(-18px,8px); }
      66%  { opacity:0.75; transform:scale(1.03) translate(12px,-6px); }
      100% { opacity:0.8; transform:scale(1.04) translate(6px,3px); }
    }

    /* Canvas 粒子层 */
    #particleCanvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      width: 100%; height: 100%;
    }

    /* ============================================================
       主容器卡片：磨砂玻璃 + 内发光边框
       ============================================================ */
    .app-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 560px;
      background: var(--card-bg);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--card-shadow);
      padding: 34px 30px 30px;
      transition: box-shadow var(--dur-slow) var(--ease-smooth), transform var(--dur-slow) var(--ease-smooth);
    }

    .app-container:hover {
      box-shadow: 0 14px 56px rgba(108,92,231,0.18), 0 4px 14px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
      transform: translateY(-1px);
    }

    /* ============================================================
       [1] 标题打卡区
       ============================================================ */
    .header-section { text-align: center; margin-bottom: 26px; }

    .title-deco {
      display: inline-block;
      font-size: 2.6rem;
      margin-bottom: 2px;
      animation: titleFloat 2.5s ease-in-out infinite;
    }
    @keyframes titleFloat {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-6px); }
    }

    .main-title {
      font-size: 1.85rem; font-weight: 900; letter-spacing: 2px;
      background: linear-gradient(135deg, #6c5ce7 0%, #e6437b 35%, #ff6b35 70%, #6c5ce7 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleShine 4s ease-in-out infinite;
      margin-bottom: 4px;
    }

    @keyframes titleShine {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      font-size: 0.88rem; color: var(--text-secondary); font-weight: 500;
      margin-bottom: 18px; opacity: 0.75;
    }

    /* 环形进度条 */
    .progress-ring-wrap {
      display: flex; justify-content: center; align-items: center; gap: 22px;
      margin-bottom: 6px;
    }
    .progress-ring {
      position: relative; width: 110px; height: 110px; flex-shrink: 0;
    }
    .progress-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }

    .progress-ring .bg-circle {
      fill: none; stroke: #eae6f8; stroke-width: 6;
    }
    .progress-ring .fg-circle {
      fill: none; stroke: url(#progressGradient); stroke-width: 6;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px rgba(108,92,231,0.35));
      transition: stroke-dashoffset 0.7s var(--ease-bounce);
    }
    .progress-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 800;
    }
    .progress-percent {
      font-size: 1.5rem; color: var(--primary-dark); line-height: 1;
    }
    .progress-label {
      font-size: 0.62rem; color: var(--text-secondary); margin-top: 2px;
    }

    .progress-detail {
      display: flex; flex-direction: column; gap: 7px;
      font-size: 0.84rem; color: var(--text-secondary); font-weight: 600;
    }
    .progress-detail span { display: flex; align-items: center; gap: 6px; }

    .stat-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
    .stat-dot.done { background: var(--success); box-shadow: 0 0 6px rgba(0,210,160,0.5); }
    .stat-dot.total { background: var(--primary-light); }

    .streak-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 14px;
      background: linear-gradient(135deg, #ff6b35, #e6437b);
      color: #fff; border-radius: 20px;
      font-size: 0.76rem; font-weight: 700;
      animation: pulse-badge 2.2s ease-in-out infinite;
      box-shadow: 0 2px 12px rgba(255,107,53,0.35);
    }
    @keyframes pulse-badge {
      0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50%     { box-shadow: 0 0 0 12px transparent; }
    }

    /* 进度文案提示 */
    .progress-hint {
      text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 10px; font-weight: 600;
    }

    /* ============================================================
       [2] 提醒设置区
       ============================================================ */
    .reminder-section {
      background: rgba(108,92,231,0.05);
      border: 1px solid rgba(108,92,231,0.08);
      border-radius: var(--radius-md);
      padding: 16px 18px; margin-bottom: 22px;
    }
    .section-label {
      font-size: 0.84rem; font-weight: 700; color: var(--primary-dark);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .reminder-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .reminder-row input[type="time"] {
      flex: 1 1 130px; min-width: 110px;
      padding: 10px 14px;
      border: 2px solid #e0ddf5; border-radius: var(--radius-sm);
      font-size: 0.92rem; font-family: var(--font-main);
      background: #fff; color: var(--text-primary);
      transition: all var(--dur-fast) var(--ease-smooth);
    }
    .reminder-row input[type="time"]:focus {
      outline: none; border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(108,92,231,0.08);
    }
    .btn-reminder {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--primary-start), var(--primary-end));
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      white-space: nowrap;
      transition: transform var(--dur-fast) var(--ease-bounce), box-shadow var(--dur-fast) var(--ease-smooth);
      position: relative; overflow: hidden;
    }
    .btn-reminder:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(108,92,231,0.35); }
    .btn-reminder:active { transform: scale(0.95); transition: transform 0.1s; }

    /* ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0); animation: rippleAnim 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    .reminder-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .reminder-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: #fff; border: 1.5px solid var(--primary-light);
      border-radius: 20px;
      font-size: 0.8rem; font-weight: 600; color: var(--primary-dark);
      box-shadow: 0 1px 4px rgba(108,92,231,0.06);
      animation: slideInUp 0.3s var(--ease-bounce);
    }
    .reminder-tag .del-tag {
      cursor: pointer; font-size: 0.95rem; color: var(--danger);
      opacity: 0.6; transition: opacity var(--dur-fast);
      line-height: 1;
    }
    .reminder-tag .del-tag:hover { opacity: 1; }

    /* ============================================================
       [3] 任务输入区
       ============================================================ */
    .input-section { display: flex; gap: 10px; margin-bottom: 20px; }

    .input-wrapper {
      flex: 1; position: relative;
    }
    .input-wrapper .input-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 1.1rem; pointer-events: none; opacity: 0.5;
      transition: opacity var(--dur-fast);
    }
    .input-wrapper input[type="text"] {
      width: 100%; padding: 14px 18px 14px 42px;
      border: 2px solid #e0ddf5; border-radius: var(--radius-md);
      font-size: 0.96rem; font-family: var(--font-main);
      background: #fff; color: var(--text-primary);
      transition: all var(--dur-fast) var(--ease-smooth);
    }
    .input-wrapper input[type="text"]:focus {
      outline: none; border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(108,92,231,0.07), 0 2px 8px rgba(0,0,0,0.04);
      transform: translateY(-1px);
    }
    .input-wrapper input[type="text"]:focus ~ .input-icon,
    .input-wrapper input[type="text"]:focus + .input-icon { opacity: 0.9; }
    .input-wrapper input[type="text"]::placeholder { color: #c8c2e8; }

    .btn-add {
      flex: 0 0 auto;
      padding: 14px 26px;
      background: linear-gradient(135deg, #ff6b35, #ff4500);
      color: #fff; border: none; border-radius: var(--radius-md);
      font-size: 1rem; font-weight: 800; letter-spacing: 1px;
      cursor: pointer; white-space: nowrap;
      position: relative; overflow: hidden;
      transition: transform var(--dur-fast) var(--ease-bounce), box-shadow var(--dur-fast) var(--ease-smooth);
      box-shadow: 0 4px 16px rgba(255,107,53,0.28);
    }
    .btn-add:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(255,107,53,0.4);
    }
    .btn-add:active { transform: scale(0.93); transition: transform 0.1s; }

    /* ============================================================
       [4] 分类筛选按钮组
       ============================================================ */
    .filter-section {
      display: flex; gap: 8px; margin-bottom: 18px;
      padding: 4px; background: rgba(108,92,231,0.04);
      border-radius: 28px;
    }
    .btn-filter {
      flex: 1; min-width: 70px;
      padding: 10px 16px;
      border: none; border-radius: 24px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.84rem; font-weight: 700;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-smooth);
      text-align: center; position: relative;
    }
    .btn-filter:hover { color: var(--primary-dark); background: rgba(255,255,255,0.5); }
    .btn-filter.active {
      background: #fff; color: var(--primary-dark);
      box-shadow: 0 2px 12px rgba(108,92,231,0.15);
    }
    .btn-filter .count-badge {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      min-width: 20px; padding: 1px 7px; border-radius: 10px;
      margin-left: 4px;
      background: rgba(108,92,231,0.1); color: var(--primary-dark);
    }
    .btn-filter.active .count-badge {
      background: rgba(108,92,231,0.15);
    }

    /* ============================================================
       [5] 任务列表
       ============================================================ */
    .task-list {
      list-style: none; display: flex; flex-direction: column; gap: 9px;
      min-height: 60px; margin-bottom: 22px;
    }

    .task-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: #fff;
      border-radius: var(--radius-md);
      border: 1.5px solid #ece9f8;
      box-shadow: 0 1px 6px rgba(0,0,0,0.025);
      transition: all var(--dur-normal) var(--ease-smooth);
      animation: slideInUp 0.4s var(--ease-bounce);
      position: relative; overflow: hidden;
    }
    .task-item::before {
      content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
      width: 4px; border-radius: 0 4px 4px 0;
      background: linear-gradient(180deg, var(--primary-start), var(--accent));
      opacity: 0; transition: opacity var(--dur-normal);
    }
    .task-item:hover {
      border-color: #d5cff5;
      box-shadow: 0 4px 18px rgba(108,92,231,0.08);
      transform: translateX(3px);
    }
    .task-item:hover::before { opacity: 1; }
    .task-item.completed {
      opacity: 0.58;
      border-color: #e8e8e8;
      background: #fafafc;
    }
    .task-item.completed::before {
      background: linear-gradient(180deg, var(--success), #00b890); opacity: 1;
    }
    .task-item.removing {
      animation: slideOutRight 0.3s var(--ease-smooth) forwards;
    }

    @keyframes slideInUp {
      from { opacity:0; transform: translateY(18px) scale(0.94); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    @keyframes slideOutRight {
      to { opacity:0; transform: translateX(80px) scale(0.88); }
    }

    /* 复选框 */
    .task-checkbox {
      flex-shrink: 0; width: 28px; height: 28px;
      appearance: none; -webkit-appearance: none;
      border: 2.5px solid #d8d2f5; border-radius: 50%;
      cursor: pointer; position: relative; background: #fff;
      transition: all var(--dur-fast) var(--ease-bounce);
    }
    .task-checkbox:hover {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 5px rgba(108,92,231,0.07);
    }
    .task-checkbox:checked {
      background: var(--success); border-color: var(--success);
      animation: checkPop 0.5s var(--ease-bounce);
    }
    .task-checkbox:checked::after {
      content: ''; position: absolute;
      left: 7px; top: 3px; width: 8px; height: 13px;
      border: solid #fff; border-width: 0 2.5px 2.5px 0;
      transform: rotate(45deg);
    }
    @keyframes checkPop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.4); }
      65%  { transform: scale(0.85); }
      100% { transform: scale(1); }
    }

    .task-text {
      flex: 1; font-size: 0.93rem; font-weight: 600;
      color: var(--text-primary); word-break: break-word;
      transition: color var(--dur-normal);
    }
    .task-item.completed .task-text {
      color: var(--text-muted);
      text-decoration: line-through; text-decoration-thickness: 2px;
      text-decoration-color: #d5d0e8;
    }

    .btn-delete {
      flex-shrink: 0; width: 34px; height: 34px;
      border: none; background: transparent; color: #d0d0d0;
      font-size: 1rem; cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--dur-fast) var(--ease-smooth);
    }
    .btn-delete:hover {
      color: var(--danger); background: rgba(255,94,94,0.08);
      transform: scale(1.15);
    }

    /* ============================================================
       空状态
       ============================================================ */
    .empty-state {
      text-align: center; padding: 36px 16px;
      display: none;
    }
    .empty-state .empty-icon {
      font-size: 3rem; margin-bottom: 10px; animation: titleFloat 2.5s ease-in-out infinite;
    }
    .empty-state .empty-msg {
      color: #c2bbe4; font-size: 0.9rem; font-weight: 600;
    }

    /* ============================================================
       [6] 底部操作区
       ============================================================ */
    .footer-section {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    }
    .btn-clear {
      padding: 10px 22px;
      background: transparent; color: var(--text-muted);
      border: 1.5px solid #e0ddf5; border-radius: 25px;
      font-size: 0.84rem; font-weight: 700; cursor: pointer;
      transition: all var(--dur-fast) var(--ease-smooth);
      position: relative; overflow: hidden;
    }
    .btn-clear:hover {
      color: var(--danger); border-color: var(--danger);
      background: rgba(255,94,94,0.04); transform: translateY(-2px);
    }
    .btn-clear:active { transform: scale(0.94); }

    /* ============================================================
       激励弹窗 Toast
       ============================================================ */
    .toast-overlay {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .toast {
      background: linear-gradient(135deg, #1a1a2e, #3b1f8e);
      color: #fff; padding: 22px 32px;
      border-radius: var(--radius-md);
      font-size: 1.05rem; font-weight: 700;
      text-align: center; line-height: 1.6;
      box-shadow: 0 16px 50px rgba(45,27,105,0.5), 0 0 0 1px rgba(255,255,255,0.08);
      animation: toastPopIn 0.5s var(--ease-bounce), toastFadeOut 0.4s 2.4s var(--ease-smooth) forwards;
      max-width: 88vw;
    }
    .toast .emoji { font-size: 2.4rem; display: block; margin-bottom: 6px; }
    @keyframes toastPopIn {
      0%   { opacity:0; transform: scale(0.4) translateY(40px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
    @keyframes toastFadeOut {
      to { opacity:0; transform: scale(0.75) translateY(-30px); }
    }

    /* ============================================================
       完成彩屑
       ============================================================ */
    .confetti-piece {
      position: fixed; pointer-events: none; z-index: 998;
      animation: confettiFall 1s ease-out forwards;
    }
    @keyframes confettiFall {
      0%   { opacity:1; transform: translate(0,0) rotate(0deg) scale(1); }
      100% { opacity:0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.3); }
    }

    /* ============================================================
       响应式
       ============================================================ */
    @media (max-width: 600px) {
      body { padding: 14px 10px 50px; }
      .app-container { padding: 24px 16px 20px; border-radius: var(--radius-lg); }
      .main-title { font-size: 1.4rem; }
      .title-deco { font-size: 2rem; }
      .progress-ring { width: 90px; height: 90px; }
      .progress-percent { font-size: 1.2rem; }
      .input-section { flex-direction: column; }
      .btn-add { width: 100%; text-align: center; }
      .reminder-row { flex-direction: column; }
      .btn-reminder { width: 100%; text-align: center; }
      .btn-filter { font-size: 0.76rem; padding: 9px 10px; }
      .task-item { padding: 12px 14px; gap: 10px; }
      .task-text { font-size: 0.86rem; }
      .toast { font-size: 0.9rem; padding: 16px 22px; }
      .toast .emoji { font-size: 1.8rem; }
    }
    @media (max-width: 380px) {
      .main-title { font-size: 1.2rem; }
      .title-deco { font-size: 1.6rem; }
      .progress-ring { width: 72px; height: 72px; }
      .progress-percent { font-size: 1rem; }
      .btn-filter { font-size: 0.7rem; padding: 8px 8px; }
    }
  </style>
</head>
<body>

  <!-- Canvas 粒子背景 -->
  <canvas id="particleCanvas"></canvas>

  <!-- ===== 主容器 ===== -->
  <main class="app-container">

    <!-- ===== [1] 标题打卡区 ===== -->
    <header class="header-section">
      <div class="title-deco">🔥</div>
      <h1 class="main-title">热血闯关 · 每日打卡</h1>
      <p class="subtitle" id="dateDisplay"></p>

      <div class="progress-ring-wrap">
        <div class="progress-ring">
          <svg viewBox="0 0 100 100">
            <defs>
              <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#6c5ce7"/>
                <stop offset="50%" stop-color="#a29bfe"/>
                <stop offset="100%" stop-color="#ff6b35"/>
              </linearGradient>
            </defs>
            <circle class="bg-circle" cx="50" cy="50" r="42"/>
            <circle class="fg-circle" id="progressCircle" cx="50" cy="50" r="42"
                    stroke-dasharray="263.89" stroke-dashoffset="263.89"/>
          </svg>
          <div class="progress-text">
            <span class="progress-percent" id="progressPercent">0%</span>
            <span class="progress-label">完成度</span>
          </div>
        </div>
        <div class="progress-detail">
          <span><span class="stat-dot done"></span> 已完成：<strong id="countDone">0</strong></span>
          <span><span class="stat-dot total"></span> 总任务：<strong id="countTotal">0</strong></span>
          <span id="streakWrap"></span>
        </div>
      </div>
      <div class="progress-hint" id="progressHint"></div>
    </header>

    <!-- ===== [2] 提醒设置区 ===== -->
    <section class="reminder-section">
      <div class="section-label">⏰ 每日定时提醒</div>
      <div class="reminder-row">
        <input type="time" id="timeInput" title="选择提醒时间">
        <button class="btn-reminder" id="btnAddReminder">➕ 添加提醒</button>
      </div>
      <div class="reminder-list" id="reminderList"></div>
    </section>

    <!-- ===== [3] 任务输入区 ===== -->
    <div class="input-section">
      <div class="input-wrapper">
        <span class="input-icon">🎯</span>
        <input type="text" id="taskInput" placeholder="输入你的热血目标……" maxlength="120" autocomplete="off">
      </div>
      <button class="btn-add" id="btnAdd">🚀 添加任务</button>
    </div>

    <!-- ===== [4] 分类筛选按钮组 ===== -->
    <div class="filter-section">
      <button class="btn-filter active" data-filter="all">📋 全部<span class="count-badge" id="countAll">0</span></button>
      <button class="btn-filter" data-filter="active">⚡ 待完成<span class="count-badge" id="countActive">0</span></button>
      <button class="btn-filter" data-filter="completed">✅ 已完成<span class="count-badge" id="countCompleted">0</span></button>
    </div>

    <!-- ===== [5] 任务列表 ===== -->
    <ul class="task-list" id="taskList"></ul>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon" id="emptyIcon">✨</div>
      <div class="empty-msg" id="emptyMsg"></div>
    </div>

    <!-- ===== [6] 底部操作区 ===== -->
    <div class="footer-section">
      <button class="btn-clear" id="btnClearDone">🧹 清空已完成</button>
    </div>

  </main>

  <!-- 激励弹窗 -->
  <div class="toast-overlay" id="toastOverlay"></div>

  <script>
  (function () {
    // ============================================================
    // 配置
    // ============================================================
    const CONFIG = {
      DAILY_GOAL: 8,
      REMINDER_CHECK_INTERVAL: 1000,
      STORAGE_KEY_TASKS: 'hotblood_tasks',
      STORAGE_KEY_REMINDERS: 'hotblood_reminders',
      STORAGE_KEY_STREAK: 'hotblood_streak',
      TOAST_DURATION: 3000,
    };

    const CHEERS = [
      { emoji:'🎯', text:'太棒了！又完成一项，离通关更近一步！' },
      { emoji:'🔥', text:'燃起来了！这就是热血的感觉！' },
      { emoji:'💪', text:'无敌是多么寂寞，继续冲！' },
      { emoji:'⚡', text:'闪电般的效率，根本停不下来！' },
      { emoji:'🏆', text:'冠军心态，每个任务都全力以赴！' },
      { emoji:'🌟', text:'你就是今天最闪亮的星！' },
      { emoji:'🚀', text:'起飞！今天的你势不可挡！' },
      { emoji:'👑', text:'王者归来，任务在你面前不堪一击！' },
      { emoji:'🎉', text:'又下一城！成就感爆棚！' },
      { emoji:'💎', text:'每一个完成都是闪耀的钻石！' },
      { emoji:'🦁', text:'猛兽出击，任务全部拿下！' },
      { emoji:'🌈', text:'风雨过后见彩虹，坚持就是胜利！' },
    ];

    const GOAL_CHEERS = [
      { emoji:'🏅', text:'今日目标达成！你就是打卡之王！' },
      { emoji:'🎊', text:'满额完成！今天的你超越了 99% 的人！' },
      { emoji:'🔥', text:'全清！热血值已爆表，明天继续燃！' },
      { emoji:'👑', text:'登顶成功！所有任务都被你征服了！' },
    ];

    // ============================================================
    // DOM 引用
    // ============================================================
    const $  = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    const domTaskList    = $('#taskList');
    const domTaskInput   = $('#taskInput');
    const domBtnAdd      = $('#btnAdd');
    const domBtnClear    = $('#btnClearDone');
    const domFilterBtns  = $$('.btn-filter');
    const domPercent     = $('#progressPercent');
    const domCountDone   = $('#countDone');
    const domCountTotal  = $('#countTotal');
    const domCountAll    = $('#countAll');
    const domCountActive = $('#countActive');
    const domCountCompleted = $('#countCompleted');
    const domStreakWrap  = $('#streakWrap');
    const domDateDisplay = $('#dateDisplay');
    const domProgressCircle = $('#progressCircle');
    const domToastOverlay  = $('#toastOverlay');
    const domReminderList  = $('#reminderList');
    const domTimeInput     = $('#timeInput');
    const domBtnAddReminder = $('#btnAddReminder');
    const domEmptyState    = $('#emptyState');
    const domEmptyIcon     = $('#emptyIcon');
    const domEmptyMsg      = $('#emptyMsg');
    const domProgressHint  = $('#progressHint');
    const domCanvas        = $('#particleCanvas');

    // ============================================================
    // 数据
    // ============================================================
    let tasks = [];
    let reminders = [];
    let currentFilter = 'all';
    let toastTimer = null;
    let reminderIntervalId = null;
    let streakData = { count:0, lastDate:null };

    // ============================================================
    // Canvas 粒子背景
    // ============================================================
    const ctx = domCanvas.getContext('2d');
    let particles = [];
    let canvasW, canvasH;
    const PARTICLE_COUNT = 55;
    const COLORS = ['rgba(108,92,231,0.18)','rgba(162,155,254,0.15)','rgba(255,107,53,0.10)','rgba(0,210,160,0.08)'];

    function resizeCanvas() {
      canvasW = domCanvas.width  = window.innerWidth;
      canvasH = domCanvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

    function initParticles() {
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * canvasW,
          y: Math.random() * canvasH,
          r: Math.random() * 4 + 2,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
        });
      }
    }
    initParticles();

    function animateParticles() {
      ctx.clearRect(0, 0, canvasW, canvasH);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < -20) p.x = canvasW + 20;
        if (p.x > canvasW + 20) p.x = -20;
        if (p.y < -20) p.y = canvasH + 20;
        if (p.y > canvasH + 20) p.y = -20;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ============================================================
    // localStorage 读写
    // ============================================================
    function loadData() {
      try { tasks = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY_TASKS)) || []; } catch(e){ tasks=[]; }
      try { reminders = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY_REMINDERS)) || []; } catch(e){ reminders=[]; }
      try { streakData = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY_STREAK)) || { count:0, lastDate:null }; } catch(e){ streakData={ count:0, lastDate:null }; }
      if (streakData.lastDate) {
        const today = getTodayStr();
        const yesterday = getDateStr(-1);
        if (streakData.lastDate !== today && streakData.lastDate !== yesterday) {
          streakData.count = 0; streakData.lastDate = null; saveStreak();
        }
      }
    }
    function saveTasks()   { try{ localStorage.setItem(CONFIG.STORAGE_KEY_TASKS, JSON.stringify(tasks)); } catch(e){} }
    function saveReminders(){ try{ localStorage.setItem(CONFIG.STORAGE_KEY_REMINDERS, JSON.stringify(reminders)); } catch(e){} }
    function saveStreak()  { try{ localStorage.setItem(CONFIG.STORAGE_KEY_STREAK, JSON.stringify(streakData)); } catch(e){} }

    // ============================================================
    // 工具函数
    // ============================================================
    function getTodayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function getDateStr(off) { const d=new Date(); d.setDate(d.getDate()+off); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
    function formatDate() {
      const d=new Date(); const w=['日','一','二','三','四','五','六'];
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 星期${w[d.getDay()]}`;
    }
    function pickRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

    // ============================================================
    // 涟漪效果
    // ============================================================
    function addRipple(e, el) {
      const rect = el.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
      ripple.style.top  = (e.clientY - rect.top - size/2) + 'px';
      el.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    }

    // ============================================================
    // 彩屑效果
    // ============================================================
    function spawnConfetti(x, y) {
      const emojis = ['✨','🌟','💫','🔥','⚡','💎','🎉','🎊'];
      for (let i=0; i<8; i++) {
        const piece = document.createElement('span');
        piece.className = 'confetti-piece';
        piece.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        piece.style.left = x + 'px';
        piece.style.top  = y + 'px';
        piece.style.fontSize = (Math.random()*16+12) + 'px';
        piece.style.setProperty('--dx', (Math.random()*120-60) + 'px');
        piece.style.setProperty('--dy', (Math.random()*-100-30) + 'px');
        piece.style.setProperty('--rot', (Math.random()*720-360) + 'deg');
        piece.style.animationDuration = (Math.random()*0.6+0.7) + 's';
        document.body.appendChild(piece);
        piece.addEventListener('animationend', () => piece.remove());
      }
    }

    // ============================================================
    // 进度更新
    // ============================================================
    function updateProgress() {
      const total = tasks.length;
      const done  = tasks.filter(t=>t.done).length;
      const pct = total===0 ? 0 : Math.round((done/total)*100);
      const circ = 263.89;
      domProgressCircle.style.strokeDashoffset = circ - (pct/100)*circ;
      domPercent.textContent = pct+'%';
      domCountDone.textContent = done;
      domCountTotal.textContent = total;
      domCountAll.textContent = total;
      domCountActive.textContent = total - done;
      domCountCompleted.textContent = done;

      if (streakData.count > 0) {
        domStreakWrap.innerHTML = `<span class="streak-badge">🔥 连续打卡 ${streakData.count} 天</span>`;
      } else {
        domStreakWrap.innerHTML = '';
      }

      // 进度提示
      const left = total - done;
      if (total === 0) {
        domProgressHint.textContent = '👇 添加你的第一个热血目标吧！';
      } else if (left === 0) {
        domProgressHint.textContent = '🏆 全部完成！今天你是最亮的星！';
      } else if (left <= 3) {
        domProgressHint.textContent = `💪 只剩 ${left} 项了，冲刺！`;
      } else if (pct >= 50) {
        domProgressHint.textContent = `⚡ 进度过半，已完成 ${pct}%，继续加油！`;
      } else {
        domProgressHint.textContent = `🎯 已完成 ${pct}%，稳扎稳打向前冲！`;
      }
    }

    function incrementStreakIfNeeded() {
      const today = getTodayStr();
      if (streakData.lastDate === today) return;
      const yesterday = getDateStr(-1);
      if (streakData.lastDate === yesterday || streakData.lastDate === null) {
        streakData.count += 1;
      } else {
        streakData.count = 1;
      }
      streakData.lastDate = today;
      saveStreak();
    }

    // ============================================================
    // 渲染
    // ============================================================
    function renderTasks() {
      let visible = tasks;
      if (currentFilter==='active')    visible = tasks.filter(t=>!t.done);
      if (currentFilter==='completed') visible = tasks.filter(t=>t.done);

      domTaskList.innerHTML = '';

      if (visible.length === 0) {
        const icons = { all:'✨', active:'🎉', completed:'📝' };
        const msgs  = {
          all: '暂无任务，快去添加一个热血目标吧！',
          active: '所有任务已全部完成，太强了！',
          completed: '还没有已完成的任务，加油冲刺！',
        };
        domEmptyIcon.textContent = icons[currentFilter] || icons.all;
        domEmptyMsg.textContent  = msgs[currentFilter]  || msgs.all;
        domEmptyState.style.display = 'block';
      } else {
        domEmptyState.style.display = 'none';
      }

      visible.forEach(task => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done?' completed':'');
        li.dataset.id = task.id;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'task-checkbox';
        cb.checked = task.done;
        cb.title = task.done?'取消完成':'标记完成';
        cb.addEventListener('change', (e) => {
          toggleTask(task.id, cb.checked, li, e);
        });

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-delete';
        delBtn.innerHTML = '✕';
        delBtn.title = '删除任务';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteTask(task.id, li);
        });

        li.appendChild(cb); li.appendChild(span); li.appendChild(delBtn);
        domTaskList.appendChild(li);
      });

      updateProgress();
    }

    // ============================================================
    // 任务操作
    // ============================================================
    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) { domTaskInput.focus(); shakeElement(domTaskInput); return; }
      tasks.unshift({ id:uid(), text:trimmed, done:false, createdAt:Date.now() });
      saveTasks();
      domTaskInput.value = '';
      domTaskInput.focus();
      renderTasks();
    }

    function toggleTask(id, isDone, li, event) {
      const task = tasks.find(t=>t.id===id);
      if (!task) return;
      task.done = isDone;

      if (isDone) {
        incrementStreakIfNeeded();
        updateProgress(); saveTasks(); renderTasks();
        // 彩屑
        if (event) {
          const rect = li.getBoundingClientRect();
          spawnConfetti(rect.left+rect.width/2, rect.top+rect.height/2);
        }
        setTimeout(() => showMotivationToast(), 400);
      } else {
        saveTasks(); renderTasks();
      }
    }

    function deleteTask(id, li) {
      if (li) {
        li.classList.add('removing');
        li.addEventListener('animationend', function h() {
          li.removeEventListener('animationend', h);
          tasks = tasks.filter(t=>t.id!==id); saveTasks(); renderTasks();
        });
      } else {
        tasks = tasks.filter(t=>t.id!==id); saveTasks(); renderTasks();
      }
    }

    function clearCompleted() {
      if (!tasks.some(t=>t.done)) return;
      tasks = tasks.filter(t=>!t.done);
      saveTasks(); renderTasks();
    }

    function setFilter(filter) {
      currentFilter = filter;
      domFilterBtns.forEach(b=>b.classList.toggle('active', b.dataset.filter===filter));
      renderTasks();
    }

    // ============================================================
    // 激励弹窗
    // ============================================================
    function showMotivationToast() {
      if (toastTimer) clearTimeout(toastTimer);
      domToastOverlay.innerHTML = '';
      const done = tasks.filter(t=>t.done).length;
      const cheer = (tasks.length>0 && done>=CONFIG.DAILY_GOAL && done>=tasks.length)
        ? pickRandom(GOAL_CHEERS) : pickRandom(CHEERS);
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<span class="emoji">${cheer.emoji}</span>${cheer.text}`;
      domToastOverlay.appendChild(toast);
      toastTimer = setTimeout(() => { domToastOverlay.innerHTML=''; toastTimer=null; }, CONFIG.TOAST_DURATION);
    }

    // ============================================================
    // 输入框抖动
    // ============================================================
    function shakeElement(el) {
      el.style.animation = 'none'; el.offsetHeight;
      el.style.animation = 'shake 0.45s ease';
      el.addEventListener('animationend', function h(){ el.removeEventListener('animationend',h); el.style.animation=''; });
    }
    const shakeStyle = document.createElement('style');
    shakeStyle.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`;
    document.head.appendChild(shakeStyle);

    // ============================================================
    // 定时提醒
    // ============================================================
    function addReminder(timeStr) {
      if (!timeStr || reminders.includes(timeStr)) return;
      reminders.push(timeStr); reminders.sort(); saveReminders(); renderReminders();
    }
    function removeReminder(timeStr) {
      reminders = reminders.filter(r=>r!==timeStr); saveReminders(); renderReminders();
    }
    function renderReminders() {
      domReminderList.innerHTML = '';
      reminders.forEach(t => {
        const tag = document.createElement('span');
        tag.className = 'reminder-tag';
        tag.innerHTML = `🕐 ${t} <span class="del-tag" data-time="${t}">✕</span>`;
        domReminderList.appendChild(tag);
      });
      domReminderList.querySelectorAll('.del-tag').forEach(b => {
        b.addEventListener('click', e => { e.stopPropagation(); removeReminder(b.dataset.time); });
      });
    }
    function checkReminders() {
      if (!reminders.length || Notification.permission!=='granted') return;
      const now = new Date();
      const cur = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      if (!reminders.includes(cur)) return;
      const key = `reminded_${cur}`;
      if (sessionStorage.getItem(key)) return;
      sessionStorage.setItem(key, '1');
      const active = tasks.filter(t=>!t.done);
      const body = active.length ? active.map((t,i)=>`${i+1}. ${t.text}`).join('\n') : '暂无待完成事项，休息一下吧~';
      try { new Notification('⚡ 热血提醒 · 该打卡了！', { body:`📋 未完成事项：\n${body}`, icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔥</text></svg>', tag:`reminder-${cur}`, requireInteraction:true }); } catch(e){}
    }
    function requestNotificationPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission==='granted'||Notification.permission==='denied') return;
      Notification.requestPermission();
    }

    // ============================================================
    // 事件绑定
    // ============================================================
    domBtnAdd.addEventListener('click', () => addTask(domTaskInput.value));
    domTaskInput.addEventListener('keydown', e => { if (e.key==='Enter') addTask(domTaskInput.value); });
    domFilterBtns.forEach(b => b.addEventListener('click', () => setFilter(b.dataset.filter)));
    domBtnClear.addEventListener('click', clearCompleted);
    domBtnAddReminder.addEventListener('click', () => { addReminder(domTimeInput.value); domTimeInput.value=''; });

    // 涟漪绑定（所有按钮）
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', e => addRipple(e, btn));
    });

    // ============================================================
    // 初始化
    // ============================================================
    function init() {
      loadData();
      renderTasks();
      renderReminders();
      domDateDisplay.textContent = formatDate();
      updateProgress();
      requestNotificationPermission();
      if (reminderIntervalId) clearInterval(reminderIntervalId);
      reminderIntervalId = setInterval(checkReminders, CONFIG.REMINDER_CHECK_INTERVAL);
      scheduleMidnightReset();
    }
    function scheduleMidnightReset() {
      const now = new Date(); const mid = new Date(now); mid.setHours(24,0,0,0);
      setTimeout(() => { sessionStorage.clear(); scheduleMidnightReset(); }, mid-now+1000);
    }

    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
    else init();

    window.addEventListener('beforeunload', () => { saveTasks(); saveReminders(); saveStreak(); });
    document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') checkReminders(); });

    console.log('🔥 热血打卡待办已就绪！');
    console.log('   🎨 Canvas 粒子背景 · 涟漪按钮 · 彩屑完成动画');
    console.log('   📋 任务 ' + tasks.length + ' 条 | ⏰ 提醒 ' + reminders.length + ' 个');
    console.log('   🔥 连续打卡 ' + streakData.count + ' 天');
  })();
  </script>
</body>
</html>
